name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend ${{ matrix.check-type }}
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        check-type: [lint, typecheck, test, build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mise (node + pnpm)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome + ESLint)
        if: matrix.check-type == 'lint'
        run: pnpm run lint

      - name: Typecheck
        if: matrix.check-type == 'typecheck'
        run: pnpm run typecheck

      - name: Test
        if: matrix.check-type == 'test'
        run: pnpm vitest run --coverage

      - name: Build
        if: matrix.check-type == 'build'
        run: pnpm run build

  audit-frontend:
    name: Frontend audit
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mise (node + pnpm)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  rust:
    name: Rust ${{ matrix.check-type }}
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        check-type: [fmt, clippy, test, build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install git-crypt
        run: sudo apt-get update && sudo apt-get install -y git-crypt

      - name: Unlock git-crypt
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          if [ -z "$GIT_CRYPT_KEY" ]; then
            echo "::error::GIT_CRYPT_KEY secret is required to decrypt src-tauri/src/github/secrets.rs"
            exit 1
          fi
          echo "$GIT_CRYPT_KEY" | base64 -d > /tmp/git-crypt.key
          git-crypt unlock /tmp/git-crypt.key
          rm /tmp/git-crypt.key

      - name: Install system dependencies
        run: |
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        if: matrix.check-type == 'fmt'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Clippy
        if: matrix.check-type == 'clippy'
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Test
        if: matrix.check-type == 'test'
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build
        if: matrix.check-type == 'build'
        run: cargo build --manifest-path src-tauri/Cargo.toml --release

  audit-rust:
    name: Rust audit
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        run: cargo audit --file src-tauri/Cargo.lock
