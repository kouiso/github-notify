name: "バグ修正 (PBI)"
description: "既存機能のバグ修正用のIssueテンプレート"
labels: ["bug"]
body:
  - type: textarea
    id: why
    attributes:
      label: "(Why?)なぜ、このタスクをやるのか？"
      description: "理由がはっきりすれば質が上がる。エンジニアレベルの説明はHow To?に記載し、ここは原則ビジネス粒度で記載しましょう。"
      value: |
        > [!TIP]
        > 理由がはっきりすれば質が上がる。エンジニアレベルの説明はHow To?に記載し、ここは原則ビジネス粒度で記載しましょう。

        ### 発生した事象の説明
        - 期待される挙動：
        - 実際の挙動：

        ### スクリーンショット/GIF/動画

        ### 再現手順
        1.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 発生プラットフォーム
      options:
        - macOS
        - Windows
        - Linux
        - 全環境
    validations:
      required: false
  - type: textarea
    id: how-to
    attributes:
      label: "(How To ?) やり方の指定があるか？"
      description: "作業時に必要なことを書いて下さい"
      value: |
        > [!TIP]
        > 作業時に必要なことを書いて下さい

        - 該当ファイルパス： 🔗

        <details>
        <summary>📝 記入例（クリックして展開）</summary>

        **良い例:**

        1. `src-tauri/src/github/client.rs` のエラーハンドリングを修正する
        2. フロントエンド側の状態管理を見直す
        3. エッジケースのテストを追加する

        **該当ファイルパス:**
        - `src-tauri/src/github/client.rs` (L45-L60)
        - `src/hooks/use-inbox.ts`

        </details>
    validations:
      required: false
  - type: textarea
    id: done-definition
    attributes:
      label: "(Complete!) 完成の定義(箇条書き)"
      description: "ゴールをはっきり決めておけば認識の違いを防げます"
      value: |
        > [!TIP]
        > ゴールをはっきり決めておけば認識の違いを防げます

        - [ ]

        <details>
        <summary>📝 記入例（クリックして展開）</summary>

        **良い例:**

        - [ ] 問題が発生していた画面で、正しく表示されるようになっている
        - [ ] 修正前に起きていたエラーが再現しなくなっている
        - [ ] 他の画面や機能に影響が出ていない
        - [ ] テストが追加・更新されている

        </details>
    validations:
      required: true
  - type: textarea
    id: else
    attributes:
      label: "(Else) その他共有事項"
      description: "共有しておけばおくほど、コミュニケーションコストを抑えられる"
      value: |
        > [!TIP]
        > 共有しておけばおくほど、コミュニケーションコストを抑えられる
    validations:
      required: false
