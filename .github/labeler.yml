dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'pnpm-lock.yaml'
          - 'src-tauri/Cargo.toml'
          - 'src-tauri/Cargo.lock'

ci/cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/labeler.yml'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'doc/**'
          - 'prompt/**'
          - 'openspec/**'

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/components/**'
          - 'src/hooks/**'
          - 'src/lib/**'
          - 'src/types/**'
          - 'src/*.tsx'
          - 'src/*.css'
          - 'public/**'

rust:
  - changed-files:
      - any-glob-to-any-file:
          - 'src-tauri/src/**'
          - 'src-tauri/Cargo.toml'
          - 'src-tauri/Cargo.lock'

tauri:
  - changed-files:
      - any-glob-to-any-file:
          - 'src-tauri/**'
          - 'src-tauri/tauri.conf.json'
          - 'src-tauri/capabilities/**'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.ts'
          - '**/*.test.tsx'
          - '**/*.spec.ts'
          - '**/*.spec.tsx'
          - 'vite.config.ts'

config:
  - changed-files:
      - any-glob-to-any-file:
          - 'eslint.config.*'
          - 'biome.json'
          - 'tsconfig*.json'
          - 'vite.config.ts'
          - '.mise.toml'
          - '.gitignore'
          - 'lint-staged.config.*'
